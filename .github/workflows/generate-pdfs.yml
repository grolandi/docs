name: Generate PDFs

on:
  push:
    branches: [main]
    paths-ignore:
      - "files/**"          # don't re-trigger when the workflow commits PDFs
  workflow_dispatch:         # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangocairo-1.0-0
          pip install weasyprint markdown pyyaml

      - name: Generate PDFs
        run: python3 pdf-generator/generate.py

      - name: Commit updated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/
          git diff --cached --quiet || git commit -m "chore: regenerate PDFs"
          git push
